<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Racing - Gameza</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:20px;
}

h1{margin-bottom:10px}
canvas{
background:#333;
border-radius:20px;
display:block;
margin:20px auto;
box-shadow:0 20px 50px rgba(0,0,0,.6);
}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.85);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
font-size:22px;
display:none;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:#00bfff;
color:white;
font-weight:600;
cursor:pointer;
}
</style>
</head>

<body>

<h1>🚗 City Racing</h1>

<canvas id="game" width="360" height="600"></canvas>

<div class="overlay" id="gameOver">
<div id="scoreText"></div>
<div id="bestText"></div>
<button onclick="restart()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const lanes = [60, 160, 260];
let playerLane = 1;

let enemies = [];
let speed = 4;
let score = 0;
let gameOver = false;

function drawRoad(){
ctx.fillStyle="#444";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="white";
ctx.lineWidth=5;
ctx.setLineDash([30,20]);
ctx.beginPath();
ctx.moveTo(120,0);
ctx.lineTo(120,600);
ctx.moveTo(240,0);
ctx.lineTo(240,600);
ctx.stroke();
ctx.setLineDash([]);
}

function drawCar(x,y,color){
ctx.fillStyle=color;
ctx.beginPath();
ctx.roundRect(x-25,y-50,50,90,12);
ctx.fill();

ctx.fillStyle="#87CEEB";
ctx.fillRect(x-18,y-35,36,25);

ctx.fillStyle="black";
ctx.fillRect(x-28,y-35,6,20);
ctx.fillRect(x+22,y-35,6,20);
ctx.fillRect(x-28,y+15,6,20);
ctx.fillRect(x+22,y+15,6,20);
}

function spawnEnemy(){
let lane = Math.floor(Math.random()*3);
let colors=["yellow","orange","lime","red","blue"];
enemies.push({
lane:lane,
y:-100,
color:colors[Math.floor(Math.random()*colors.length)]
});
}

function update(){
if(gameOver) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

drawRoad();

drawCar(lanes[playerLane],520,"red");

enemies.forEach((enemy,i)=>{
enemy.y += speed;
drawCar(lanes[enemy.lane],enemy.y,enemy.color);

if(enemy.lane===playerLane && enemy.y>450 && enemy.y<550){
endGame();
}
});

score++;
if(score%400===0) speed+=0.5;

ctx.fillStyle="white";
ctx.font="16px Poppins";
ctx.fillText("Score: "+score,10,20);

requestAnimationFrame(update);
}

function endGame(){
gameOver=true;

let best = localStorage.getItem("best")||0;
if(score>best){
localStorage.setItem("best",score);
best=score;
}

document.getElementById("scoreText").innerText="Game Over! Score: "+score;
document.getElementById("bestText").innerText="Best: "+best;
document.getElementById("gameOver").style.display="flex";
}

function restart(){
enemies=[];
speed=4;
score=0;
gameOver=false;
document.getElementById("gameOver").style.display="none";
update();
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft" && playerLane>0) playerLane--;
if(e.key==="ArrowRight" && playerLane<2) playerLane++;
});

canvas.addEventListener("touchstart",e=>{
let x=e.touches[0].clientX;
if(x<window.innerWidth/2 && playerLane>0) playerLane--;
else if(playerLane<2) playerLane++;
});

setInterval(spawnEnemy,1500);
update();
</script>

</body>
</html>
