<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Racing - Play Free Online | Gameza</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
padding:20px;
}

h1{margin-bottom:10px}
p{opacity:.8;margin-bottom:20px}

canvas{
background:#2b2b2b;
border-radius:15px;
display:block;
margin:20px auto;
box-shadow:0 15px 40px rgba(0,0,0,.5);
}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.8);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
font-size:22px;
display:none;
}

button{
margin-top:20px;
padding:12px 25px;
border:none;
border-radius:30px;
background:#00bfff;
color:white;
font-weight:600;
cursor:pointer;
}

.back{
display:inline-block;
margin-top:25px;
text-decoration:none;
color:#00bfff;
font-weight:600;
}

.ad-box{
margin:20px auto;
max-width:800px;
height:90px;
background:rgba(255,255,255,0.05);
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
opacity:.6;
font-size:14px;
}
</style>
</head>

<body>

<h1>🚗 City Racing</h1>
<p>Avoid traffic and survive as long as possible!</p>

<div class="ad-box">Advertisement Space (Top Banner)</div>

<canvas id="game" width="350" height="600"></canvas>

<div class="ad-box">Advertisement Space (Bottom Banner)</div>

<a class="back" href="/gameza/car-games/">⬅ Back to Car Games</a>

<div class="overlay" id="gameOverScreen">
<div id="finalScore"></div>
<div id="highScore"></div>
<button onclick="restartGame()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let car, enemies, roadLines, speed, score, gameOver;

function init(){
car = { x: 155, y: 500, width: 40, height: 70 };
enemies = [];
roadLines = [];
speed = 4;
score = 0;
gameOver = false;

for(let i=0;i<6;i++){
roadLines.push({y:i*120});
}

document.getElementById("gameOverScreen").style.display="none";
}

function drawRoad(){
ctx.fillStyle="#444";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
roadLines.forEach(line=>{
ctx.fillRect(canvas.width/2 - 5, line.y, 10, 60);
line.y += speed;
if(line.y > canvas.height) line.y = -60;
});
}

function drawCar(){
ctx.fillStyle="red";
ctx.fillRect(car.x, car.y, car.width, car.height);
}

function spawnEnemy(){
let x = Math.random() * (canvas.width - 40);
let colors=["yellow","blue","green","orange"];
let color = colors[Math.floor(Math.random()*colors.length)];
enemies.push({ x:x, y:-70, width:40, height:70, color:color });
}

function drawEnemies(){
enemies.forEach(enemy=>{
enemy.y += speed;
ctx.fillStyle=enemy.color;
ctx.fillRect(enemy.x, enemy.y, enemy.width, enemy.height);

if(
car.x < enemy.x + enemy.width &&
car.x + car.width > enemy.x &&
car.y < enemy.y + enemy.height &&
car.y + car.height > enemy.y
){
endGame();
}
});
}

function drawScore(){
ctx.fillStyle="white";
ctx.font="16px Poppins";
ctx.fillText("Score: "+score, 10, 20);
}

function update(){
if(gameOver) return;

ctx.clearRect(0,0,canvas.width,canvas.height);

drawRoad();
drawCar();
drawEnemies();
drawScore();

score++;
if(score % 500 === 0) speed += 0.5;

requestAnimationFrame(update);
}

function endGame(){
gameOver=true;
let best = localStorage.getItem("highscore") || 0;
if(score > best){
localStorage.setItem("highscore", score);
best = score;
}

document.getElementById("finalScore").innerText="Game Over! Score: "+score;
document.getElementById("highScore").innerText="Best: "+best;
document.getElementById("gameOverScreen").style.display="flex";
}

function restartGame(){
init();
update();
}

document.addEventListener("keydown", e=>{
if(e.key==="ArrowLeft" && car.x>0) car.x-=20;
if(e.key==="ArrowRight" && car.x<canvas.width-car.width) car.x+=20;
});

// Touch controls
canvas.addEventListener("touchstart", e=>{
let touchX = e.touches[0].clientX;
if(touchX < window.innerWidth/2 && car.x>0) car.x-=20;
else if(car.x<canvas.width-car.width) car.x+=20;
});

setInterval(spawnEnemy, 1500);

init();
update();
</script>

</body>
</html>
