<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>City Racing - Official Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}

body{
background:linear-gradient(180deg,#0f2027,#203a43,#2c5364);
overflow:hidden;
color:white;
text-align:center;
}

canvas{
display:block;
margin:0 auto;
border-radius:25px;
box-shadow:0 40px 100px rgba(0,0,0,.7);
background:#111;
}

/* INTRO SCREEN */
.intro{
position:fixed;
width:100%;height:100%;
background:linear-gradient(180deg,#0f2027,#203a43);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:20;
animation:fadeIn 1.5s ease;
}

.logo{
font-size:42px;
font-weight:800;
letter-spacing:2px;
animation:zoom 2s ease;
}

@keyframes zoom{
0%{transform:scale(.3);opacity:0}
100%{transform:scale(1);opacity:1}
}

@keyframes fadeIn{
from{opacity:0}
to{opacity:1}
}

button{
margin-top:25px;
padding:14px 30px;
border:none;
border-radius:30px;
background:#00c6ff;
color:white;
font-weight:600;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.05);
}

.hud{
position:absolute;
top:15px;
left:15px;
text-align:left;
font-size:14px;
}

.gameover{
position:fixed;
width:100%;height:100%;
background:rgba(0,0,0,.9);
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:15;
}
</style>
</head>
<body>

<div class="intro" id="intro">
<div class="logo">🚗 CITY RACING</div>
<p>Endless Highway Challenge</p>
<button onclick="startGame()">Start Game</button>
</div>

<canvas id="game" width="420" height="700"></canvas>

<div class="hud" id="hud"></div>

<div class="gameover" id="gameover">
<h2 id="finalScore"></h2>
<h3 id="bestScore"></h3>
<button onclick="restart()">Play Again</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let lanes=[140,210,280];
let currentLane=1;
let targetX=lanes[currentLane];

let player={x:targetX,y:560};
let enemies=[];
let coins=[];
let speed=7;
let score=0;
let coinCount=0;
let combo=1;
let running=false;
let offset=0;

function drawRoad(){
offset+=speed;

ctx.fillStyle="#2e7d32";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#444";
ctx.fillRect(80,0,260,canvas.height);

ctx.strokeStyle="white";
ctx.lineWidth=5;
ctx.setLineDash([50,40]);
ctx.beginPath();
ctx.moveTo(210,-offset%90);
ctx.lineTo(210,canvas.height);
ctx.stroke();
ctx.setLineDash([]);
}

function drawCar(x,y,color){
ctx.fillStyle="rgba(0,0,0,0.35)";
ctx.beginPath();
ctx.ellipse(x,y+55,28,10,0,0,Math.PI*2);
ctx.fill();

let grad = ctx.createLinearGradient(x-25,y-50,x+25,y+50);
grad.addColorStop(0,color);
grad.addColorStop(1,"#222");

ctx.fillStyle=grad;
ctx.beginPath();
ctx.roundRect(x-25,y-50,50,100,20);
ctx.fill();

ctx.fillStyle="#bde0fe";
ctx.beginPath();
ctx.roundRect(x-15,y-30,30,35,8);
ctx.fill();

ctx.fillStyle="black";
ctx.fillRect(x-28,y-30,6,22);
ctx.fillRect(x+22,y-30,6,22);
ctx.fillRect(x-28,y+35,6,22);
ctx.fillRect(x+22,y+35,6,22);
}

function spawnEnemy(){
let lane=Math.floor(Math.random()*3);
enemies.push({x:lanes[lane],y:-120});
}

function spawnCoin(){
let lane=Math.floor(Math.random()*3);
coins.push({x:lanes[lane],y:-50,angle:0});
}

function update(){
if(!running)return;

ctx.clearRect(0,0,canvas.width,canvas.height);
drawRoad();

player.x+= (targetX-player.x)*0.2;
drawCar(player.x,player.y,"#ff3c38");

enemies.forEach((enemy,i)=>{
enemy.y+=speed;
drawCar(enemy.x,enemy.y,"#ffd60a");

if(Math.abs(enemy.x-player.x)<40 && Math.abs(enemy.y-player.y)<60){
endGame();
}
});

coins.forEach((coin,i)=>{
coin.y+=speed;
coin.angle+=0.1;

ctx.save();
ctx.translate(coin.x,coin.y);
ctx.rotate(coin.angle);
ctx.fillStyle="gold";
ctx.beginPath();
ctx.arc(0,0,10,0,Math.PI*2);
ctx.fill();
ctx.restore();

if(Math.abs(coin.x-player.x)<30 && Math.abs(coin.y-player.y)<40){
coinCount++;
combo++;
coins.splice(i,1);
}
});

score+=combo;

if(score%1000===0)speed+=0.5;

document.getElementById("hud").innerHTML=
"Score: "+score+
"<br>Coins: "+coinCount+
"<br>Combo x"+combo;

requestAnimationFrame(update);
}

function startGame(){
document.getElementById("intro").style.display="none";
running=true;
update();
}

function endGame(){
running=false;
let best=localStorage.getItem("bestPro")||0;
if(score>best){
localStorage.setItem("bestPro",score);
best=score;
}
document.getElementById("finalScore").innerText="Score: "+score;
document.getElementById("bestScore").innerText="Best: "+best;
document.getElementById("gameover").style.display="flex";
}

function restart(){
enemies=[];
coins=[];
speed=7;
score=0;
coinCount=0;
combo=1;
currentLane=1;
targetX=lanes[currentLane];
document.getElementById("gameover").style.display="none";
running=true;
update();
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft" && currentLane>0){
currentLane--;
targetX=lanes[currentLane];
}
if(e.key==="ArrowRight" && currentLane<2){
currentLane++;
targetX=lanes[currentLane];
}
});

canvas.addEventListener("touchstart",e=>{
let x=e.touches[0].clientX;
if(x<window.innerWidth/2 && currentLane>0){
currentLane--;
targetX=lanes[currentLane];
}
else if(currentLane<2){
currentLane++;
targetX=lanes[currentLane];
}
});

setInterval(spawnEnemy,900);
setInterval(spawnCoin,1400);
</script>

</body>
</html>
