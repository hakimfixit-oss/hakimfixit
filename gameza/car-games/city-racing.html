<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metro Runner Elite</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}
body{
background:radial-gradient(circle at top,#1f2a44,#0d1321);
overflow:hidden;
color:white;
text-align:center;
}
canvas{
display:block;
margin:0 auto;
border-radius:20px;
box-shadow:0 40px 80px rgba(0,0,0,.8);
background:#111;
}
.screen{
position:fixed;width:100%;height:100%;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
background:linear-gradient(#0d1321,#1f2a44);
z-index:10;
}
button{
margin-top:20px;
padding:14px 30px;
border:none;border-radius:30px;
background:#00c6ff;color:white;
font-weight:600;cursor:pointer;
}
.hud{
position:absolute;top:15px;left:15px;
font-size:14px;text-align:left;
}
.bar{
width:120px;height:8px;background:#333;border-radius:10px;margin-top:5px;
}
.bar-fill{
height:100%;width:100%;background:linear-gradient(90deg,#00ffcc,#00c6ff);
border-radius:10px;
}
</style>
</head>
<body>

<div class="screen" id="intro">
<h1>🚇 Metro Runner Elite</h1>
<p>Ultimate Endless Challenge</p>
<button onclick="startGame()">Start</button>
</div>

<canvas id="game" width="420" height="700"></canvas>

<div class="hud">
<div id="score">Score: 0</div>
<div class="bar"><div class="bar-fill" id="nitroBar"></div></div>
</div>

<div class="screen" id="gameover" style="display:none;background:rgba(0,0,0,.9)">
<h2 id="finalScore"></h2>
<button onclick="restart()">Restart</button>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let lanes=[130,210,290];
let currentLane=1;
let targetX=lanes[currentLane];

let player={
x:targetX,
y:550,
width:40,
height:70,
vy:0,
gravity:0.8,
jumpPower:-14,
ground:550,
isJumping:false
};

let obstacles=[];
let coins=[];
let speed=7;
let score=0;
let running=false;
let offset=0;
let nitro=100;
let shake=0;

function drawCity(){
for(let i=0;i<5;i++){
ctx.fillStyle="#1a2238";
ctx.fillRect(i*100,(offset*0.2+i*50)%700,80,200);
}
}

function drawRoad(){
ctx.fillStyle="#333";
ctx.fillRect(90,0,240,700);

ctx.strokeStyle="#777";
ctx.lineWidth=2;
ctx.setLineDash([30,30]);
ctx.beginPath();
ctx.moveTo(210,-offset%60);
ctx.lineTo(210,700);
ctx.stroke();
ctx.setLineDash([]);
}

function drawPlayer(){
ctx.save();
ctx.shadowColor="#00ffcc";
ctx.shadowBlur=20;
ctx.fillStyle="#00ffcc";
ctx.fillRect(player.x-20,player.y-30,40,70);
ctx.restore();
}

function spawnObstacle(){
let lane=Math.floor(Math.random()*3);
obstacles.push({x:lanes[lane],y:-80});
}

function spawnCoin(){
let lane=Math.floor(Math.random()*3);
coins.push({x:lanes[lane],y:-50,angle:0});
}

function update(){
if(!running)return;

ctx.clearRect(0,0,420,700);

if(shake>0){
ctx.translate(Math.random()*5-2.5,Math.random()*5-2.5);
shake--;
}

offset+=speed;

drawCity();
drawRoad();

player.x+=(targetX-player.x)*0.25;

if(player.isJumping){
player.vy+=player.gravity;
player.y+=player.vy;
if(player.y>=player.ground){
player.y=player.ground;
player.isJumping=false;
}
}

drawPlayer();

obstacles.forEach((obs,i)=>{
obs.y+=speed;
ctx.fillStyle="#ff3c38";
ctx.fillRect(obs.x-20,obs.y,40,40);

if(
player.x+20>obs.x-20 &&
player.x-20<obs.x+20 &&
player.y+30>obs.y &&
player.y-30<obs.y+40
){
endGame();
}
});

coins.forEach((coin,i)=>{
coin.y+=speed;
coin.angle+=0.2;

ctx.save();
ctx.translate(coin.x,coin.y);
ctx.rotate(coin.angle);
ctx.fillStyle="gold";
ctx.shadowColor="gold";
ctx.shadowBlur=15;
ctx.beginPath();
ctx.arc(0,0,8,0,Math.PI*2);
ctx.fill();
ctx.restore();

if(
player.x-20<coin.x+8 &&
player.x+20>coin.x-8 &&
player.y-30<coin.y+8 &&
player.y+30>coin.y-8
){
score+=50;
coins.splice(i,1);
}
});

score+=1;
if(score%800===0)speed+=0.5;

document.getElementById("score").innerText="Score: "+score;
document.getElementById("nitroBar").style.width=nitro+"%";

requestAnimationFrame(update);
}

function startGame(){
document.getElementById("intro").style.display="none";
running=true;
update();
}

function endGame(){
running=false;
shake=15;
document.getElementById("finalScore").innerText="Final Score: "+score;
document.getElementById("gameover").style.display="flex";
}

function restart(){
obstacles=[];coins=[];
speed=7;score=0;
currentLane=1;
targetX=lanes[currentLane];
player.y=player.ground;
document.getElementById("gameover").style.display="none";
running=true;
update();
}

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft"&&currentLane>0){
currentLane--;targetX=lanes[currentLane];
}
if(e.key==="ArrowRight"&&currentLane<2){
currentLane++;targetX=lanes[currentLane];
}
if(e.key==="ArrowUp"&&!player.isJumping){
player.isJumping=true;
player.vy=player.jumpPower;
}
});

setInterval(spawnObstacle,1000);
setInterval(spawnCoin,1400);
</script>

</body>
</html>
