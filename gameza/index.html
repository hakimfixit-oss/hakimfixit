<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gameza – Play Free Online Games</title>

<meta name="description" content="Gameza is your destination to play free online games. Discover car games, arcade games, driving simulators and more – no download required.">

<meta name="robots" content="index, follow">
<meta name="theme-color" content="#111827">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
background:linear-gradient(135deg,#111827,#1f2937,#0f172a);
color:white;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:70px 20px;
}

/* Logo */
.logo{
font-size:42px;
font-weight:700;
letter-spacing:2px;
margin-bottom:10px;
}

.logo span{
color:#3b82f6;
}

.tagline{
opacity:.8;
margin-bottom:50px;
font-size:18px;
}

/* Categories */
.categories{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
margin-bottom:60px;
}

.card{
background:rgba(255,255,255,0.05);
padding:40px 20px;
border-radius:20px;
transition:.3s;
cursor:pointer;
text-decoration:none;
color:white;
}

.card:hover{
background:rgba(59,130,246,0.25);
transform:translateY(-6px);
}

.card h3{
margin-top:15px;
font-size:20px;
}

/* Button */
.main-btn{
display:inline-block;
margin-top:20px;
padding:15px 35px;
border-radius:40px;
background:#3b82f6;
color:white;
text-decoration:none;
font-weight:600;
transition:.3s;
}

.main-btn:hover{
background:#2563eb;
transform:translateY(-3px);
}

footer{
margin-top:80px;
opacity:.6;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">Game<span>za</span></div>
<p class="tagline">Play Free Online Games – No Download Required</p>

<div class="categories">
<a href="#" class="card">
🎮
<h3>Arcade Games</h3>
</a>

<a href="#" class="card">
🚗
<h3>Car Games</h3>
</a>

<a href="#" class="card">
🧠
<h3>Puzzle Games</h3>
</a>

<a href="#" class="card">
🔥
<h3>Action Games</h3>
</a>
</div>

<a href="#" class="main-btn">Start Playing</a>

<footer>
© 2026 Gameza – All Rights Reserved
</footer>

</div>

</body>
</html>
