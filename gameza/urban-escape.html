<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Gameza Escape 3D</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#ui{
position:absolute;
top:20px;
left:20px;
color:white;
font-family:Arial;
font-size:18px;
}
</style>
</head>
<body>

<div id="ui">
Score: <span id="score">0</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene();
scene.background = new THREE.Color(0x0b1120);

let camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,7,12);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,15,10);
scene.add(light);

scene.add(new THREE.AmbientLight(0x404040));

let lanes = [-4,0,4];
let currentLane = 1;

function createCharacter(bodyColor){
let group = new THREE.Group();

let body = new THREE.Mesh(
new THREE.BoxGeometry(1.2,2,1),
new THREE.MeshStandardMaterial({color:bodyColor})
);
body.position.y = 1.5;
group.add(body);

let head = new THREE.Mesh(
new THREE.BoxGeometry(1,1,1),
new THREE.MeshStandardMaterial({color:0xffccaa})
);
head.position.y = 3;
group.add(head);

let leftLeg = new THREE.Mesh(
new THREE.BoxGeometry(0.4,1.2,0.4),
new THREE.MeshStandardMaterial({color:0x222222})
);
leftLeg.position.set(-0.3,0.6,0);
group.add(leftLeg);

let rightLeg = leftLeg.clone();
rightLeg.position.x = 0.3;
group.add(rightLeg);

group.userData = {leftLeg,rightLeg};

return group;
}

let player = createCharacter(0x00ffcc);
player.position.set(lanes[currentLane],0,5);
scene.add(player);

let police = createCharacter(0xff0000);
police.position.set(lanes[currentLane],0,9);
scene.add(police);

let road = new THREE.Mesh(
new THREE.PlaneGeometry(20,400),
new THREE.MeshStandardMaterial({color:0x222222})
);
road.rotation.x = -Math.PI/2;
scene.add(road);

function createBuilding(x,z){
let geo = new THREE.BoxGeometry(3,Math.random()*10+5,3);
let mat = new THREE.MeshStandardMaterial({color:0x1e293b});
let b = new THREE.Mesh(geo,mat);
b.position.set(x,geo.parameters.height/2,z);
scene.add(b);
}

for(let i=-200;i<200;i+=20){
createBuilding(-10,i);
createBuilding(10,i);
}

let obstacles=[];
let coins=[];
let speed=0.6;
let score=0;

function spawnObstacle(){
let obs = new THREE.Mesh(
new THREE.BoxGeometry(2,2,2),
new THREE.MeshStandardMaterial({color:0xffaa00})
);
let lane = Math.floor(Math.random()*3);
obs.position.set(lanes[lane],1,-150);
scene.add(obs);
obstacles.push(obs);
}

function spawnCoin(){
let coin = new THREE.Mesh(
new THREE.TorusGeometry(0.7,0.2,16,100),
new THREE.MeshStandardMaterial({color:0xffff00})
);
let lane = Math.floor(Math.random()*3);
coin.position.set(lanes[lane],1,-120);
scene.add(coin);
coins.push(coin);
}

setInterval(spawnObstacle,1300);
setInterval(spawnCoin,1600);

function animate(){
requestAnimationFrame(animate);

// leg animation
let time = Date.now()*0.01;
player.userData.leftLeg.rotation.x = Math.sin(time)*0.5;
player.userData.rightLeg.rotation.x = -Math.sin(time)*0.5;

// move objects
obstacles.forEach((obs,i)=>{
obs.position.z += speed;

if(obs.position.z > 15){
scene.remove(obs);
obstacles.splice(i,1);
}

if(
Math.abs(obs.position.z - player.position.z) < 1.5 &&
Math.abs(obs.position.x - player.position.x) < 1.5
){
speed *= 0.8;
}
});

coins.forEach((coin,i)=>{
coin.rotation.y += 0.15;
coin.position.z += speed;

if(
Math.abs(coin.position.z - player.position.z) < 1 &&
Math.abs(coin.position.x - player.position.x) < 1
){
score += 100;
scene.remove(coin);
coins.splice(i,1);
}
});

score++;
if(speed<1.5) speed+=0.0007;

document.getElementById("score").innerText=score;

// police follow
police.position.x += (player.position.x - police.position.x)*0.1;
police.position.z += (player.position.z - police.position.z - 3)*0.03;

if(Math.abs(police.position.z - player.position.z)<1){
alert("🚔 Police Caught You! Score: "+score);
location.reload();
}

// smooth camera
camera.position.x += (player.position.x - camera.position.x)*0.1;
camera.lookAt(player.position.x,1,0);

renderer.render(scene,camera);
}

animate();

document.addEventListener("keydown",e=>{
if(e.key==="ArrowLeft" && currentLane>0){
currentLane--;
}
if(e.key==="ArrowRight" && currentLane<2){
currentLane++;
}
player.position.x = lanes[currentLane];
});

</script>
</body>
</html>
