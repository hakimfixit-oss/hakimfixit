<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}

body{
background:
radial-gradient(circle at 50% -20%, #1c1c1e 0%, #0f0f10 40%, #000000 100%);
color:#fff;
text-align:center;
-webkit-font-smoothing:antialiased;
scroll-behavior:smooth;
}

.container{
max-width:900px;
margin:auto;
padding:90px 20px;
}

.logo{
width:220px;
margin:auto;
display:block;
margin-bottom:50px;
}

h1{
font-size:52px;
font-weight:700;
letter-spacing:-1px;
margin-bottom:15px;
}

.tagline{
font-size:20px;
opacity:.7;
margin-bottom:70px;
}

.buttons{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin-bottom:90px;
}

.btn{
min-width:260px;
height:58px;
border-radius:50px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
font-size:17px;
font-weight:600;
text-decoration:none;
transition:.3s ease;
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(8px);
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.whatsapp{background:#25D366;color:white}
.call{background:#1c1c1e;color:white}
.instagram{background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);color:white}
.tiktok{background:#111;color:white}
.directions{background:#2a2a2d;color:white}
.review{background:#ffffff;color:#000;font-weight:700}

.section-title{
font-size:34px;
margin-bottom:60px;
font-weight:600;
}

.services{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
margin-bottom:90px;
}

.card{
background:rgba(255,255,255,0.04);
padding:45px 20px;
border-radius:25px;
border:1px solid rgba(255,255,255,0.06);
transition:.4s ease;
}

.card:hover{
background:rgba(255,255,255,0.08);
transform:translateY(-6px);
}

.service-icon{
font-size:30px;
margin-bottom:20px;
opacity:.8;
}

.address{
font-size:18px;
line-height:1.8;
opacity:.8;
margin-bottom:50px;
}

.phone a{
color:#fff;
text-decoration:none;
font-weight:600;
}

iframe{
border-radius:20px;
width:100%;
height:350px;
border:none;
margin-bottom:90px;
}

.about{
max-width:700px;
margin:auto;
font-size:17px;
line-height:1.8;
opacity:.7;
margin-bottom:90px;
}

footer{
opacity:.5;
font-size:14px;
}

/* Smooth Fade */
.hidden{
opacity:0;
transform:translateY(30px);
transition:all .8s cubic-bezier(.2,.65,.3,1);
}

.show{
opacity:1;
transform:translateY(0);
}
</style>
